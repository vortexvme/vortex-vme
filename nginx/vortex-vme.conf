##############################################################################
# HPE Morpheus VME Classic — Nginx Site Configuration
# Generated by deploy.sh — edit carefully
##############################################################################

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name _;

    # ── TLS Certificate ───────────────────────────────────────────────────────
    ssl_certificate     /etc/ssl/morpheus-vme/cert.pem;
    ssl_certificate_key /etc/ssl/morpheus-vme/key.pem;

    # ── TLS Hardening ─────────────────────────────────────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               HIGH:!aNULL:!MD5:!RC4;
    ssl_prefer_server_ciphers on;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       10m;

    root  /var/www/morpheus-vme-classic/dist;
    index index.html;

    # ── Security Headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           SAMEORIGIN always;
    add_header X-Content-Type-Options    nosniff always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ── Gzip Compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               application/wasm image/svg+xml;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_vary on;

    # ── Runtime config — lives outside dist/ so rsync never deletes it ───────
    location = /config.json {
        root /var/www/morpheus-vme-classic;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── Static Assets (long cache) ────────────────────────────────────────────
    location ~* \.(js|css|wasm|woff2?|ttf|ico|png|svg|webp|json)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Proxy buffer sizing (Morpheus returns large headers) ──────────────────
    proxy_buffer_size       128k;
    proxy_buffers           4 256k;
    proxy_busy_buffers_size 256k;

    # ── Morpheus API Proxy — /api/* ───────────────────────────────────────────
    location /api/ {
        proxy_pass        VME_MANAGER_URL_PLACEHOLDER/api/;
        proxy_set_header  Host              $proxy_host;
        proxy_set_header  X-Real-IP         $remote_addr;
        proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Proto $scheme;
        proxy_set_header  Authorization     $http_authorization;
        proxy_pass_header Authorization;
        proxy_http_version 1.1;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_ssl_verify  off;

        proxy_hide_header Access-Control-Allow-Origin;
    }

    # ── OAuth Token Proxy — /oauth/* ──────────────────────────────────────────
    location /oauth/ {
        proxy_pass        VME_MANAGER_URL_PLACEHOLDER/oauth/;
        proxy_set_header  Host              $proxy_host;
        proxy_set_header  X-Real-IP         $remote_addr;
        proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 30s;
        proxy_ssl_verify  off;
    }

    # ── Console Terminal Proxy — /terminal/* ─────────────────────────────────
    # The VME Manager hosts the console UI at /terminal/server/{id}.
    # Proxying it here lets VME Classic open consoles without cross-origin auth.
    location /terminal/ {
        proxy_pass        VME_MANAGER_URL_PLACEHOLDER/terminal/;
        proxy_set_header  Host              $proxy_host;
        proxy_set_header  X-Real-IP         $remote_addr;
        proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Proto $scheme;
        proxy_set_header  Authorization     $http_authorization;
        proxy_pass_header Authorization;
        proxy_http_version 1.1;
        # WebSocket support (console sessions use WS)
        proxy_set_header  Upgrade           $http_upgrade;
        proxy_set_header  Connection        "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_ssl_verify  off;
    }

    # ── SPA Fallback ──────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── Health Check ──────────────────────────────────────────────────────────
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}
